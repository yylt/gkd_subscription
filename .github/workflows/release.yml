name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gkd.json5
          generate_release_notes: true
          name: Release ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref }}
          body: |
            ## 小哇的GKD订阅 ${{ steps.version.outputs.VERSION }}

            ### 订阅地址
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.version.outputs.VERSION }}/dist/gkd.json5
            ```

            ### 国内镜像（推荐）
            ```
            https://fastly.jsdelivr.net/gh/${{ github.repository }}@${{ steps.version.outputs.VERSION }}/dist/gkd.json5
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
